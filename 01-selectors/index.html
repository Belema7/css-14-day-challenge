<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Selectors Core</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Main Selectors Examples</h1>

  <!-- Type Selector -->
  <p>This paragraph is styled using a type selector.</p>

  <!-- Class Selector -->
  <div class="card">
    <h2>Card Title</h2>
    <p>Paragraph inside card.</p>
    <button class="btn">Click Me</button>
  </div>

  <!-- ID Selector -->
  <div id="unique-box">
    Unique Box
  </div>

  <!-- Child Selector Example -->
  <ul class="nav">
    <li>Home</li>
    <li>About</li>
    <li>Contact</li>
  </ul>

  <!-- Attribute Selector -->
  <input type="text" placeholder="Text input">
  <input type="password" placeholder="Password input">

  <!-- Pseudo-class Example -->
  <button>Hover Me</button>

</body>
</html>
