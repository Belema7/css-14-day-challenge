<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Display Examples</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>CSS Display Property Examples</h1>

  <!-- Block Example -->
  <section>
    <h2>1. Block</h2>
    <div class="block-example">Block Element 1</div>
    <div class="block-example">Block Element 2</div>
  </section>

  <!-- Inline Example -->
  <section>
    <h2>2. Inline</h2>
    <span class="inline-example">Inline 1</span>
    <span class="inline-example">Inline 2</span>
  </section>

  <!-- Inline Block Example -->
  <section>
    <h2>3. Inline-Block</h2>
    <div class="inline-block-example">Box 1</div>
    <div class="inline-block-example">Box 2</div>
  </section>

  <!-- Display None Example -->
  <section>
    <h2>4. Display None</h2>
    <div class="visible-box">I am visible</div>
    <div class="hidden-box">You should not see me</div>
  </section>

  <!-- Flex Example -->
  <section>
    <h2>5. Flex</h2>
    <div class="flex-container">
      <div class="flex-item">1</div>
      <div class="flex-item">2</div>
      <div class="flex-item">3</div>
    </div>
  </section>

  <!-- Grid Example -->
  <section>
    <h2>6. Grid</h2>
    <div class="grid-container">
      <div class="grid-item">A</div>
      <div class="grid-item">B</div>
      <div class="grid-item">C</div>
      <div class="grid-item">D</div>
    </div>
  </section>

</body>
</html>
